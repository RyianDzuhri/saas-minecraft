version: '3.8'

services:
  app:
    image: bitnami/laravel:10
    ports:
      - "80:8000"
    volumes:
      - ./:/app
      # INI PENTING: Izin agar Laravel bisa bikin container Minecraft
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mysql-db

  mysql-db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=saas_minecraft
      - MYSQL_ROOT_PASSWORD=rahasia123
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: